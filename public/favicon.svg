<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Panic developer favicon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#20283a"/>
      <stop offset="100%" stop-color="#46516b"/>
    </linearGradient>
  </defs>

  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>

  <!-- hair -->
  <path d="M14 28c1-13 11-21 20-21 10 0 19 8 20 21-2-3-5-5-9-6 3 4 3 10 0 14-4 5-9 8-11 10-2-2-7-5-11-10-3-4-3-10 0-14-4 1-7 3-9 6z" fill="#1a1417"/>

  <!-- face -->
  <path d="M20 24c0-8 5-13 12-13s12 5 12 13v8c0 9-6 15-12 15s-12-6-12-15z" fill="#d99267"/>
  <path d="M23 35c2 4 5 6 9 6s7-2 9-6v3c0 6-4 9-9 9s-9-3-9-9z" fill="#c67a52" opacity=".45"/>

  <!-- glasses -->
  <g fill="none" stroke="#3a2b22" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="18" y="18" width="12" height="8" rx="2.5"/>
    <rect x="34" y="18" width="12" height="8" rx="2.5"/>
    <path d="M30 22h4"/>
    <path d="M17 21l-3-2"/>
    <path d="M47 21l3-2"/>
  </g>

  <!-- brows -->
  <path d="M22 29l7-3" stroke="#2f211b" stroke-width="2.6" stroke-linecap="round"/>
  <path d="M35 26l7 3" stroke="#2f211b" stroke-width="2.6" stroke-linecap="round"/>

  <!-- eyes -->
  <g>
    <circle cx="26" cy="32" r="4.5" fill="#fff"/>
    <circle cx="38" cy="32" r="4.5" fill="#fff"/>
    <circle cx="27.8" cy="32.8" r="2.1" fill="#2b1b18"/>
    <circle cx="39.6" cy="31.1" r="2.1" fill="#2b1b18"/>
    <circle cx="28.6" cy="32" r=".7" fill="#fff"/>
    <circle cx="40.2" cy="30.5" r=".7" fill="#fff"/>
  </g>

  <!-- nose -->
  <path d="M33 31c.6 2.2 1.3 4.3 2.5 5.7" stroke="#9f6042" stroke-width="1.8" stroke-linecap="round" fill="none"/>

  <!-- mustache + beard -->
  <path d="M26 41c2.2-1.5 4-2.1 6-2.1s3.8.6 6 2.1" stroke="#2a1b18" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <path d="M25 45c2.6 2 4.5 3 7 3s4.4-1 7-3" stroke="#2a1b18" stroke-width="2.2" stroke-linecap="round" fill="none"/>

  <!-- mouth -->
  <ellipse cx="32" cy="42" rx="7.8" ry="6.8" fill="#5e1b1d"/>
  <path d="M25 40.5c3-1.4 5.3-2 7-2s4 .6 7 2" fill="#fff3e8"/>
  <path d="M29.5 43.5c1.2 1 1.8 2.1 2.5 3.8 1-1.7 1.6-2.8 2.5-3.8 1.5.2 2.7.8 3.8 1.5-1.3 2.4-3.8 4.5-6.3 4.5s-5-2.1-6.3-4.5c1.1-.7 2.3-1.3 3.8-1.5z" fill="#d9798a"/>

  <!-- sweat -->
  <path d="M46 27c1.4 1.9 1.8 3.2 1 4.2-.7 1-2.2.8-3-.2-.9-1.1-.6-2.5 2-4z" fill="#8ecae6"/>
  <path d="M41 14c1.4 1.9 1.8 3.2 1 4.2-.7 1-2.2.8-3-.2-.9-1.1-.6-2.5 2-4z" fill="#8ecae6" opacity=".9"/>

  <!-- panic sparks -->
  <g fill="#ff9d3c">
    <rect x="10" y="16" width="3" height="3" transform="rotate(20 11.5 17.5)"/>
    <rect x="50" y="13" width="3" height="3" transform="rotate(28 51.5 14.5)"/>
    <rect x="49" y="47" width="3" height="3" transform="rotate(12 50.5 48.5)"/>
    <rect x="13" y="48" width="3" height="3" transform="rotate(45 14.5 49.5)"/>
  </g>
</svg>
